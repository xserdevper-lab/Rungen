<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MACROTRACK AI</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Impact&family=Inter:wght@400;700;900&display=swap');
        .nike-font { font-family: 'Impact', 'Inter', sans-serif; letter-spacing: -0.05em; }
        .body-font { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-black text-white body-font min-h-screen flex flex-col justify-between p-6">

    <header class="flex justify-between items-center">
        <h1 class="nike-font text-2xl italic text-[#E5FF00]">MACROTRACK</h1>
        <span class="text-xs font-bold tracking-widest text-zinc-500">TODAY</span>
    </header>

    <main class="flex-1 flex flex-col justify-center items-center my-auto">
        <div class="text-center">
            <h2 id="cal-remaining" class="nike-font text-[110px] leading-none font-black italic">2000</h2>
            <p class="text-xs font-black tracking-widest text-zinc-400 mt-2">KCAL REMAINING</p>
        </div>
    </main>

    <section id="result-box" class="hidden bg-zinc-900 p-4 rounded-2xl mb-6 border border-zinc-800 animate-pulse-once">
        <div class="flex justify-between items-center">
            <div>
                <h3 id="food-name" class="font-black text-lg text-white">ชื่ออาหาร</h3>
                <p id="food-portion" class="text-sm text-zinc-400">ปริมาณ: -</p>
            </div>
            <div id="food-cals" class="nike-font text-2xl text-[#E5FF00] italic">+0 KCAL</div>
        </div>
    </section>

    <input type="file" id="camera-input" accept="image/*" capture="environment" class="hidden">

    <footer>
        <button id="scan-btn" class="w-full bg-[#E5FF00] text-black font-black text-lg py-5 rounded-full uppercase tracking-wider hover:bg-yellow-300 active:scale-95 transition-transform duration-100 flex justify-center items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0x" />
            </svg>
            SCAN MEAL
        </button>
    </footer>

    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Running Stats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app-wrapper">
    <!-- Header -->
    <header class="app-header">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="14" r="13" stroke="white" stroke-width="1.5"/>
          <path d="M8 18L12 10L16 15L19 12" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="logo-text">RUNSTAT</span>
      </div>
      <div class="lang-switcher">
        <button class="lang-btn active" data-lang="th">TH</button>
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="kr">한</button>
      </div>
    </header>

    <!-- Input Section -->
    <section class="input-section">
      <div class="section-label" id="label-input">กรอกข้อมูลการวิ่ง</div>

      <div class="input-grid">
        <div class="input-group">
          <label class="input-label" id="label-distance">ระยะทาง</label>
          <div class="input-wrapper">
            <input type="number" id="distance" placeholder="5.00" step="0.01" min="0" />
            <span class="input-unit" id="unit-distance">กม.</span>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label" id="label-pace">เพซ</label>
          <div class="input-wrapper">
            <input type="text" id="pace" placeholder="5:30" />
            <span class="input-unit" id="unit-pace">นาที/กม.</span>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label" id="label-time">เวลา</label>
          <div class="input-wrapper">
            <input type="text" id="time" placeholder="27:30" />
            <span class="input-unit" id="unit-time">นาที</span>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label" id="label-calories">แคลอรี่</label>
          <div class="input-wrapper">
            <input type="number" id="calories" placeholder="258" min="0" />
            <span class="input-unit">kcal</span>
          </div>
        </div>
      </div>

      <button class="generate-btn" id="generateBtn" onclick="generateCard()">
        <span id="btn-text">สร้างสถิติ</span>
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M3 9H15M15 9L10 4M15 9L10 14" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </section>

    <!-- Result Card -->
    <section class="result-section" id="resultSection">
      <div class="stats-card" id="statsCard">

        <!-- Glow Top -->
        <div class="card-glow"></div>

        <!-- Card Header -->
        <div class="card-header">
          <div class="card-tag" id="card-tag">วิ่ง</div>
          <div class="card-date" id="card-date"></div>
        </div>

        <!-- Big Distance -->
        <div class="distance-display">
          <div class="distance-value" id="display-distance">—</div>
          <div class="distance-unit" id="display-distance-unit">กิโลเมตร</div>
        </div>

        <!-- Divider -->
        <div class="card-divider">
          <div class="divider-line"></div>
        </div>

        <!-- 3 Stats Row -->
        <div class="stats-row">
          <div class="stat-item">
            <div class="stat-value" id="display-pace">—</div>
            <div class="stat-label" id="stat-label-pace">เพซ</div>
          </div>
          <div class="stat-separator"></div>
          <div class="stat-item">
            <div class="stat-value" id="display-time">—</div>
            <div class="stat-label" id="stat-label-time">เวลา</div>
          </div>
          <div class="stat-separator"></div>
          <div class="stat-item">
            <div class="stat-value" id="display-calories">—</div>
            <div class="stat-label">kcal</div>
          </div>
        </div>

        <!-- Footer -->
        <div class="card-footer">
          <div class="footer-badge">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <circle cx="6" cy="6" r="5" stroke="#999" stroke-width="1"/>
              <path d="M3 6L5 8L9 4" stroke="#999" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span id="footer-text">RUNSTAT</span>
          </div>
        </div>

      </div>
    </section>

    <!-- Footer Nav -->
    <nav class="bottom-nav">
      <div class="nav-item active">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M3 10L10 3L17 10V18H13V13H7V18H3V10Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="nav-item">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M10 2L12.5 7.5H18L13.5 11L15.5 17L10 13.5L4.5 17L6.5 11L2 7.5H7.5L10 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="nav-item">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="8" r="3" stroke="currentColor" stroke-width="1.5"/>
          <path d="M4 17C4 14 6.7 12 10 12C13.3 12 16 14 16 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
    </nav>
  </div>

  <script src="script.js"></script>
</body>
</html>
